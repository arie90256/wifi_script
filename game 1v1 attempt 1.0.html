<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Santa Hunter's — Gamepad Ready</title>
<style>
    html,body { height:100%; margin:0; background:#111; color:#ddd; font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial; }
    #ui { position:fixed; left:10px; top:64px; z-index:10000; background:rgba(0,0,0,0.65); padding:8px; border-radius:6px; pointer-events:auto; }
    #canvas { display:block; width:100vw; height:100vh; background:#0b0b0b; cursor:none; }
    .label { font-size:13px; margin-right:8px; color:#bbb; }
    button,input { font-size:13px; margin:4px 2px; }
    #help { position:absolute; right:10px; top:10px; background:rgba(0,0,0,0.45); padding:8px; border-radius:6px; color:#ccc; font-size:13px; max-width:320px; }
    /* minimap container fixed top-right */
    #miniMapContainer { position:fixed; right:10px; top:10px; z-index:2147483645; background:rgba(0,0,0,0.55); padding:6px; border-radius:6px; pointer-events:none; }
    #miniMapCanvas { display:block; width:220px; height:160px; image-rendering: pixelated; }
    /* spawn controls inside main UI */
    #spawnControls { margin-top:8px; display:flex; gap:6px; align-items:center; }
    #spawnControls select, #spawnControls input, #spawnControls button { pointer-events:auto; }
    /* crosshair overlay */
    /* hide the fixed CSS crosshair overlay to avoid a persistent + in the middle */
    #crosshair { display:none !important; position:fixed; left:50%; top:50%; transform:translate(-50%,-50%); width:40px; height:40px; pointer-events:none; z-index:2147483651; }
    #crosshair .ch-vert, #crosshair .ch-horz { position:absolute; background:rgba(255,255,255,0.9); }
    #crosshair .ch-vert { left:50%; top:4px; width:2px; height:32px; transform:translateX(-50%); border-radius:1px; }
    #crosshair .ch-horz { top:50%; left:4px; height:2px; width:32px; transform:translateY(-50%); border-radius:1px; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div id="miniMapContainer"><canvas id="miniMapCanvas" width="220" height="160"></canvas></div>

<div id="crosshair"><div class="ch-vert"></div><div class="ch-horz"></div></div>
<!-- Touch controls for mobile: left joystick + right fire/aim area -->
<div id="touchControls" style="position:fixed; left:0; top:0; right:0; bottom:0; pointer-events:none; z-index:2147483652;">
    <div id="joyLeft" style="position:fixed; left:18px; bottom:18px; width:120px; height:120px; border-radius:60px; background:rgba(0,0,0,0.25); pointer-events:auto; touch-action:none;">
        <div id="joyLeftKnob" style="position:absolute; left:50%; top:50%; width:44px; height:44px; margin-left:-22px; margin-top:-22px; border-radius:22px; background:rgba(255,255,255,0.12);"></div>
    </div>
    <div id="fireBtn" style="position:fixed; right:18px; bottom:18px; width:92px; height:92px; border-radius:46px; background:rgba(255,80,80,0.18); pointer-events:auto; touch-action:manipulation; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:bold;">FIRE</div>
    <div id="reloadBtn" style="position:fixed; right:18px; bottom:122px; width:64px; height:40px; border-radius:6px; background:rgba(0,0,0,0.45); pointer-events:auto; touch-action:manipulation; display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px;">RELOAD</div>
</div>

<div id="ui">
    <div style="margin-top:2px; font-weight:700; font-size:18px; color:#ffd86b;">Santa Hunter's</div>
    <div style="margin-top:6px"><span class="label">P1 Lv:</span><span id="p1Level">1</span> &nbsp; <span class="label">P1 XP:</span><span id="p1Xp">0</span> &nbsp; <span class="label">Shards:</span><span id="shardCount">0</span> &nbsp; <span class="label">Gamepad:</span><span id="gpStatus">None</span> &nbsp; <span class="label">FPS:</span><span id="fps">--</span> &nbsp; <span class="label">Enemies:</span><span id="enemyCount">0</span></div>
    <div style="margin-top:6px"><span class="label">P1 Weapons:</span><span id="p1Weapons">Pistol L1</span></div>
    <div style="margin-top:6px"><span class="label">P2 Weapons:</span><span id="p2Weapons">Off</span></div>
        <div style="margin-top:6px">
            <span class="label">Mode:</span>
            <select id="modeSelect">
                <option value="normal">Normal</option>
                <option value="1v1">1v1</option>
            </select>
            <button id="btnApplyMode">Apply</button>
        </div>
        <div style="margin-top:6px">
            <span class="label">Difficulty:</span>
            <select id="difficultySelect">
                <option value="easy">Easy</option>
                <option value="normal" selected>Normal</option>
                <option value="hard">Hard</option>
                <option value="insane">Insane</option>
            </select>
            <button id="btnApplyDifficulty">Set</button>
        </div>
        <div style="margin-top:6px">
            <span class="label">Mouse:</span>
            <select id="mouseControl">
                <option value="1">P1</option>
                <option value="2">P2</option>
            </select>
        </div>
        <div style="margin-top:6px">
        <label class="label">Sens:</label><input id="sens" type="range" min="0.1" max="6" step="0.1" value="2.2">
        <label class="label">Dead:</label><input id="dead" type="range" min="0" max="0.5" step="0.01" value="0.12">
        </div>
        <div style="margin-top:8px">
            <span class="label">Map:</span><span id="mapLevel">1</span> &nbsp; <span class="label">Theme:</span><span id="mapTheme">Stone</span>
        </div>
        <div style="margin-top:8px; display:flex; gap:8px; align-items:center;">
            <button id="btnFullscreen">Fullscreen</button>
            <button id="btnToggleSfx">Toggle SFX</button>
            <button id="btnClearGP">Clear Gamepads</button>
            <button id="btnAllowShare">Allow Share</button>
            <button id="btnResetMap">Reset Map</button>
            <button id="btnSaveSettings">Save Settings</button>
            <button id="btnSpawnTest">Spawn Test</button>
            <label class="label" style="margin-left:6px">Low Perf:</label><input id="lowPerf" type="checkbox" style="vertical-align:middle;">
            <!-- spawn controls are in the main spawn area below -->
        </div>
        <div id="spawnControls">
            <label class="label">Spawn:</label>
            <select id="spawnEnemySelect">
                <option value="snowman">Snowman</option>
                <option value="elf">Elf</option>
                <option value="crampus">Crampus</option>
                <option value="gnome">Gnome</option>
                <option value="santa">Santa</option>
                <option value="spider">Spider</option>
            </select>
            <input id="spawnCount" type="number" min="1" max="50" value="1" style="width:56px">
            <button id="btnSpawnInFront">Spawn In Front</button>
        </div>
        <div style="margin-top:8px; text-align:center;">
            <button id="btnShowHideUI">Hide UI</button>
        </div>
        <script>
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            // Hide touch controls on non-mobile devices
            try{
                const touchControlsEl = document.getElementById('touchControls');
                function isTouchDevice(){ try{ return ('ontouchstart' in window) || (navigator.maxTouchPoints && navigator.maxTouchPoints>0) || (navigator.msMaxTouchPoints && navigator.msMaxTouchPoints>0); }catch(_){ return false; } }
                const isMobileLike = isTouchDevice() && (Math.min(window.innerWidth, window.innerHeight) <= 900 || /Mobi|Android|iPhone|iPad|Mobile/i.test(navigator.userAgent));
                if(touchControlsEl) touchControlsEl.style.display = isMobileLike ? 'block' : 'none';
            }catch(_){ }
            // (removed separate cover overlay canvas; covers will be integrated into wall rendering)
            // global error overlay: draw errors to canvas so a JS exception doesn't leave a black screen
            window.addEventListener('error', function(ev){
                try{ console.error(ev.error || ev.message || ev); const msg = (ev.error && ev.error.stack) ? ev.error.stack : (ev.message||String(ev)); ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#f55'; ctx.font='14px monospace'; ctx.textAlign='left'; const lines = (''+msg).split('\n').slice(0,8); for(let i=0;i<lines.length;i++){ ctx.fillText(lines[i].substring(0,200), 12, 24 + i*18); } }catch(_){ }
            });
            window.addEventListener('unhandledrejection', function(ev){ try{ console.error('unhandledrejection', ev); const msg = ev.reason && ev.reason.stack ? ev.reason.stack : String(ev.reason); ctx.fillStyle='#000'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle='#f55'; ctx.font='14px monospace'; ctx.textAlign='left'; const lines = (''+msg).split('\n').slice(0,8); for(let i=0;i<lines.length;i++){ ctx.fillText(lines[i].substring(0,200), 12, 24 + i*18); } }catch(_){ } });
            let W = 0, H = 0;

            // map/maze
            const cols = 41, rows = 27; // odd numbers - larger labyrinth
            const map = Array(rows).fill(0).map(()=>Array(cols).fill(1));
            // cover cell map: true if a cell contains a cover (treated like a short wall)
            const coverCells = Array(rows).fill(0).map(()=>Array(cols).fill(false));
            // scale spawn counts by map size (use sqrt of area ratio to avoid extreme counts)
            const MAP_AREA_SCALE = Math.max(1, Math.round(Math.sqrt((cols * rows) / (21 * 13))));
            const cellSize = 64; // world units

            // visual scale for character sprites (players + enemies)
            const CHARACTER_RENDER_SCALE = 1.25; // increase to make characters bigger

            // global speed modifiers (make players and enemies slower)
            const playerSpeedFactor = 0.7; // players move at 70% of original
            const enemySpeedFactor = 0.6;  // enemies move at 60% of original

            // Performance caps for particle/projectile pools to reduce GC and CPU
            let MAX_PARTICLES = 800;
            let MAX_BULLETS = 250;
            let MAX_DEBRIS = 200;
            let MAX_EXPLOSIONS = 40;
            let MAX_LOOT = 200;
            // cap active enemies to avoid huge CPU spikes — increased per user request
            let MAX_ENEMIES = 100;
            let MAX_PROJECTILES = 80;
            let MAX_SPRITES = 120;
            // cap chests per map
            const MAX_CHESTS = 200;

            function cappedPush(arr, item, cap){ try{ if(!cap || arr.length < cap) arr.push(item); else arr[Math.floor(Math.random()*arr.length)] = item; }catch(_){ } }

            // gameplay tuning
            const COVER_BASE_PROB = 0.55; // baseline probability to place cover in open cells
            const COVER_PROB_PER_LEVEL = 0.02; // increase per level

            // boss tuning
            const BOSS_BASE_HP = 3000;
            const BOSS_HP_PER_LEVEL = 400;
            const BOSS_ATTACK_COOLDOWN = 5000; // ms 
            const BOSS_WARN_DURATION = 4000; // ms before attack show warning
            const BOSS_CHASE_INTERVAL = 3000; // ms - bosses will chase/fight every 3s
            const BOSS_ATTACK_RADIUS_CELLS = 9; // radius in cells
            // level count
            const MAX_LEVELS = 15; // total labyrinths

            // boss variants (5 total) - generate distinct boss images
            function makeBossVariantDataURL(idx){
                const colors = ['#b43b3b','#3b6bb4','#6bb43b','#b46bb4','#b48a3b'];
                const accent = colors[idx % colors.length] || '#b43b3b';
                const c = document.createElement('canvas'); c.width = 256; c.height = 256; const g = c.getContext('2d');
                g.clearRect(0,0,256,256);
                // base body with accent
                const grad = g.createLinearGradient(128,40,128,216); grad.addColorStop(0,accent); grad.addColorStop(1,'#0f0f0f'); g.fillStyle = grad; g.beginPath(); g.ellipse(128,140,84,96,0,0,Math.PI*2); g.fill();
                // chest plate highlight
                g.fillStyle = '#222'; g.fillRect(64,96,128,56);
                // eyes stripe using accent complement
                g.fillStyle = '#ffd86b'; g.fillRect(112,48,32,8);
                // horns vary by index
                g.fillStyle = '#2b2b2b'; if(idx % 2 === 0){ g.beginPath(); g.moveTo(84,40); g.quadraticCurveTo(60,12,92,24); g.fill(); } else { g.beginPath(); g.moveTo(172,40); g.quadraticCurveTo(196,12,164,24); g.fill(); }
                // subtle glow
                g.globalCompositeOperation = 'lighter'; const mg = g.createRadialGradient(128,140,16,128,140,140); mg.addColorStop(0,'rgba(255,160,120,0.18)'); mg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle = mg; g.beginPath(); g.arc(128,140,120,0,Math.PI*2); g.fill(); g.globalCompositeOperation = 'source-over';
                return c.toDataURL();
            }
            const bossImgs = []; for(let i=0;i<5;i++){ const im = new Image(); im.src = makeBossVariantDataURL(i); bossImgs.push(im); }

                        // small generated sprites for effects
                        function makeMuzzleDataURL(){ const c = document.createElement('canvas'); c.width=64; c.height=64; const g=c.getContext('2d'); g.clearRect(0,0,64,64); const rg=g.createRadialGradient(32,24,4,32,24,28); rg.addColorStop(0,'rgba(255,240,200,1)'); rg.addColorStop(0.4,'rgba(255,160,80,0.9)'); rg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle=rg; g.beginPath(); g.arc(32,24,28,0,Math.PI*2); g.fill(); return c.toDataURL(); }
                        function makeSpearTrailDataURL(){ const c=document.createElement('canvas'); c.width=48;c.height=8; const g=c.getContext('2d'); g.clearRect(0,0,48,8); const lg=g.createLinearGradient(0,0,48,0); lg.addColorStop(0,'rgba(200,200,255,0.9)'); lg.addColorStop(1,'rgba(200,200,255,0)'); g.fillStyle=lg; g.fillRect(0,0,48,8); return c.toDataURL(); }
                        function makeDragonTrailDataURL(){ const c=document.createElement('canvas'); c.width=64;c.height=16; const g=c.getContext('2d'); const lg=g.createLinearGradient(0,0,64,0); lg.addColorStop(0,'rgba(255,140,80,0.95)'); lg.addColorStop(1,'rgba(255,60,10,0)'); g.fillStyle=lg; g.fillRect(0,0,64,16); return c.toDataURL(); }
                        function makeSlashDataURL(){ const c=document.createElement('canvas'); c.width=96;c.height=48; const g=c.getContext('2d'); g.clearRect(0,0,96,48); g.fillStyle='rgba(255,220,200,0.95)'; g.beginPath(); g.ellipse(48,24,44,18, -0.7, 0, Math.PI*2); g.fill(); return c.toDataURL(); }
                        function makePoisonPuffDataURL(){ const c=document.createElement('canvas'); c.width=64;c.height=64; const g=c.getContext('2d'); const rg=g.createRadialGradient(32,32,4,32,32,28); rg.addColorStop(0,'rgba(180,255,160,0.95)'); rg.addColorStop(1,'rgba(80,160,80,0)'); g.fillStyle=rg; g.fillRect(0,0,64,64); return c.toDataURL(); }
                        const muzzleImg = new Image(); muzzleImg.src = makeMuzzleDataURL();
                        const spearTrailImg = new Image(); spearTrailImg.src = makeSpearTrailDataURL();
                        const dragonTrailImg = new Image(); dragonTrailImg.src = makeDragonTrailDataURL();
                        const slashImg = new Image(); slashImg.src = makeSlashDataURL();
                        const poisonPuffImg = new Image(); poisonPuffImg.src = makePoisonPuffDataURL();
                        // barrel overlay for first-person view
                        function makeBarrelDataURL(){ const c=document.createElement('canvas'); c.width=512; c.height=256; const g=c.getContext('2d'); g.clearRect(0,0,512,256); // vignette
                            const vg=g.createLinearGradient(0,0,0,256); vg.addColorStop(0,'rgba(0,0,0,0.0)'); vg.addColorStop(1,'rgba(0,0,0,0.85)'); g.fillStyle=vg; g.fillRect(0,0,512,256);
                            // barrel tube
                            g.fillStyle='#222'; g.beginPath(); g.ellipse(256,130,140,90,0,0,Math.PI*2); g.fill(); g.fillStyle='#111'; g.beginPath(); g.ellipse(256,130,120,70,0,0,Math.PI*2); g.fill(); // muzzle ring
                            g.strokeStyle='#444'; g.lineWidth=6; g.beginPath(); g.ellipse(256,130,120,70,0,0,Math.PI*2); g.stroke(); return c.toDataURL(); }
                        const barrelImg = new Image(); barrelImg.src = makeBarrelDataURL();
                        // double-barrel shotgun ADS overlay (for aiming down sights)
                        function makeDoubleBarrelDataURL(){
                            const c = document.createElement('canvas'); c.width = 512; c.height = 256; const g = c.getContext('2d'); g.clearRect(0,0,512,256);
                            // global vignette (darken edges)
                            const vg = g.createRadialGradient(256,128,40,256,128,420); vg.addColorStop(0,'rgba(0,0,0,0.0)'); vg.addColorStop(0.6,'rgba(0,0,0,0.45)'); vg.addColorStop(1,'rgba(0,0,0,0.9)'); g.fillStyle = vg; g.fillRect(0,0,512,256);

                            // barrel positions
                            const cx = 256, cy = 128; const sep = 96; const leftX = cx - sep/2, rightX = cx + sep/2;

                            // helper: draw single barrel (outer rim, inner bore depth)
                            function drawBarrel(centerX){
                                // outer metal rim (slightly reflective)
                                const rimGrad = g.createLinearGradient(centerX-68, cy-40, centerX+68, cy+40);
                                rimGrad.addColorStop(0,'#2a2a2a'); rimGrad.addColorStop(0.5,'#1a1a1a'); rimGrad.addColorStop(1,'#2b2b2b');
                                g.fillStyle = rimGrad;
                                g.beginPath(); g.ellipse(centerX, cy, 86, 46, 0, 0, Math.PI*2); g.fill();

                                // inner bore: darker center to suggest depth
                                const boreGrad = g.createRadialGradient(centerX, cy, 6, centerX, cy, 120);
                                boreGrad.addColorStop(0,'rgba(12,12,12,0.95)'); boreGrad.addColorStop(0.4,'rgba(8,8,8,0.9)'); boreGrad.addColorStop(1,'rgba(0,0,0,0.2)');
                                g.fillStyle = boreGrad; g.beginPath(); g.ellipse(centerX, cy, 64, 34, 0, 0, Math.PI*2); g.fill();

                                // inner concentric rings for muzzle texture (subtle)
                                g.strokeStyle = 'rgba(0,0,0,0.25)';
                                for(let r=52; r>18; r-=10){ g.lineWidth = 1.2; g.beginPath(); g.ellipse(centerX, cy, r, Math.max(6, Math.floor(r*0.55)), 0, 0, Math.PI*2); g.stroke(); }

                                // bright rim highlight
                                g.strokeStyle = 'rgba(255,255,255,0.08)'; g.lineWidth = 3; g.beginPath(); g.ellipse(centerX, cy-4, 86, 46, 0, Math.PI*0.12, Math.PI*0.88); g.stroke();

                                // slight specular streak on top-left
                                const sg = g.createLinearGradient(centerX-60, cy-28, centerX+60, cy+28); sg.addColorStop(0,'rgba(255,255,255,0.12)'); sg.addColorStop(0.2,'rgba(255,255,255,0.02)'); sg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle = sg; g.beginPath(); g.ellipse(centerX-6, cy-10, 76, 40, 0, 0, Math.PI*2); g.fill();
                            }

                            // draw left and right barrels
                            drawBarrel(leftX); drawBarrel(rightX);

                            // center sight rib between barrels (metal strip)
                            g.fillStyle = '#111'; g.fillRect(cx - 8, cy - 42, 16, 84);
                            g.fillStyle = '#222'; g.fillRect(cx - 6, cy - 40, 12, 80);
                            // small bead front sight (bright tiny dot)
                            g.fillStyle = '#ffd86b'; g.beginPath(); g.arc(cx, cy - 44, 3, 0, Math.PI*2); g.fill();

                            // subtle depth glow at muzzle center (ambient light)
                            const mg = g.createRadialGradient(cx, cy, 8, cx, cy, 150); mg.addColorStop(0,'rgba(255,200,120,0.06)'); mg.addColorStop(1,'rgba(0,0,0,0)'); g.fillStyle = mg; g.beginPath(); g.arc(cx, cy, 150, 0, Math.PI*2); g.fill();

                            // red crosshair: central dot + short bars with soft glow
                            g.save();
                            g.translate(cx, cy);
                            // glow
                            const glow = g.createRadialGradient(0,0,2,0,0,36); glow.addColorStop(0,'rgba(255,60,60,0.35)'); glow.addColorStop(1,'rgba(255,60,60,0)'); g.fillStyle = glow; g.beginPath(); g.arc(0,0,36,0,Math.PI*2); g.fill();
                            // core lines
                            g.strokeStyle = 'rgba(255,60,60,0.98)'; g.lineWidth = 6; g.lineCap = 'round';
                            g.beginPath(); g.moveTo(-24,0); g.lineTo(-6,0); g.moveTo(6,0); g.lineTo(24,0); g.moveTo(0,-24); g.lineTo(0,-6); g.moveTo(0,6); g.lineTo(0,24); g.stroke();
                            // center dot
                            g.fillStyle = 'rgba(255,40,40,1)'; g.beginPath(); g.arc(0,0,5,0,Math.PI*2); g.fill();
                            g.restore();

                            // slight chromatic fringe for immersion (thin colored edge)
                            g.globalCompositeOperation = 'lighter'; g.strokeStyle = 'rgba(255,80,120,0.04)'; g.lineWidth = 1; g.beginPath(); g.ellipse(leftX-0.5, cy-0.5, 86, 46, 0, 0, Math.PI*2); g.stroke(); g.beginPath(); g.ellipse(rightX+0.5, cy+0.5, 86, 46, 0, 0, Math.PI*2); g.stroke(); g.globalCompositeOperation = 'source-over';

                            return c.toDataURL();
                        }
                        const doubleBarrelImg = new Image(); doubleBarrelImg.src = makeDoubleBarrelDataURL();

            // dungeon themes
            const themes = [
                { name: 'Stone', wall: '#2b2b2b', wallAlt: '#1f1f1f', floor: '#666', mortar: 'rgba(0,0,0,0.25)', cover: '#444' },
                { name: 'Crypt', wall: '#2a1e20', wallAlt: '#3a2628', floor: '#666', mortar: 'rgba(0,0,0,0.25)', cover: '#3b2f2f' },
                { name: 'Moss', wall: '#2b3a2b', wallAlt: '#223322', floor: '#666', mortar: 'rgba(0,0,0,0.18)', cover: '#2f3a2f' },
                { name: 'Ice', wall: '#2b3340', wallAlt: '#243142', floor: '#666', mortar: 'rgba(255,255,255,0.06)', cover: '#394a5a' }
            ];
            function currentTheme(){ return themes[(level-1) % themes.length]; }

            // Cave-floor texture generator: produces a small canvas used as a repeating pattern
            function makeCaveFloorCanvas(th){
                const s = 128; const c = document.createElement('canvas'); c.width = s; c.height = s; const g = c.getContext('2d');
                // base color derived from theme wall but darker
                const base = (th && th.wall) ? th.wall : '#0b0b0b';
                // vertical subtle gradient
                const bg = g.createLinearGradient(0,0,0,s); bg.addColorStop(0, shadeColor(base, 0.95)); bg.addColorStop(1, shadeColor(base, 0.7)); g.fillStyle = bg; g.fillRect(0,0,s,s);
                // blotches: simulate rocky irregularities
                for(let i=0;i<220;i++){
                    const rx = Math.random() * s, ry = Math.random() * s; const rr = 2 + Math.random()*18;
                    const t = Math.random(); const col = (t < 0.6) ? shadeColor(base, 0.85 + Math.random()*0.25) : shadeColor(base, 0.55 + Math.random()*0.35);
                    g.globalAlpha = 0.04 + Math.random()*0.14; g.fillStyle = col; g.beginPath(); g.arc(rx, ry, rr, 0, Math.PI*2); g.fill();
                }
                g.globalAlpha = 1.0;
                // faint vein lines
                g.strokeStyle = shadeColor(base, 0.45); g.lineWidth = 1; for(let v=0; v<10; v++){ g.beginPath(); const y0 = Math.random()*s; g.moveTo(0,y0); for(let x=0;x<=s;x+=8){ g.lineTo(x, y0 + Math.sin((x/ s)*Math.PI*2 + v) * (1 + Math.random()*4)); } g.stroke(); }
                // add subtle per-pixel noise

            // ensure the maze is fully connected: join components by removing separating walls
            function ensureConnectivity(){
                // flood fill components on open cells (map value 0)
                const comp = Array(rows).fill(0).map(()=>Array(cols).fill(-1));
                let id = 0;
                for(let r=0;r<rows;r++){
                    for(let c=0;c<cols;c++){
                        if(map[r][c]===0 && comp[r][c]===-1){
                            // BFS
                            const q=[[r,c]]; comp[r][c]=id;

                        for(let c=1;c<cols-1 && !removed;c++){

                                const up = (r-1>=0? comp[r-1][c] : -1);
                                const down = (r+1<rows? comp[r+1][c] : -1);
                                const left = (c-1>=0? comp[r][c-1] : -1);
                                const right = (c+1<cols? comp[r][c+1] : -1);
                                if(up!==-1 && down!==-1 && up!==down){ map[r][c]=0; removed=true; }
                                else if(left!==-1 && right!==-1 && left!==right){ map[r][c]=0; removed=true; }
                            }
                        }
                    }
                    if(!removed) break;
                    // recompute components
                    for(let rr=0;rr<rows;rr++) for(let cc=0;cc<cols;cc++) comp[rr][cc]=-1;
                    id=0;
                    for(let rr=0;rr<rows;rr++){
                        for(let cc=0;cc<cols;cc++){
                            if(map[rr][cc]===0 && comp[rr][cc]===-1){
                                const q=[[rr,cc]]; comp[rr][cc]=id;
                                while(q.length){ const [r2,c2]=q.shift(); const dirs=[[1,0],[-1,0],[0,1],[0,-1]]; for(const d of dirs){ const nr=r2+d[0], nc=c2+d[1]; if(nr>=0&&nr<rows&&nc>=0&&nc<cols && map[nr][nc]===0 && comp[nr][nc]===-1){ comp[nr][nc]=id; q.push([nr,nc]); } }
                                }
                                id++;
                            }
                        }
                    }
                }
            }

            // raycasting per player

            function shadeColor(col, shade){ const c = hexToRgb(col); return `rgba(${Math.floor(c.r*shade)},${Math.floor(c.g*shade)},${Math.floor(c.b*shade)},1)`; }

                    opts = opts || {};
                    const ignoreCovers = !!opts.ignoreCovers;

                try{ console.error('Fatal script error:', e); }catch(_){ }
                try{ setLastError((e && e.stack) ? e.stack : String(e)); }catch(_){ }
            }

        </script>
        <script>
            // Additional UI wiring: spawn button and persistent minimap (safe isolated block)
            try{
                // spawn controls wiring: only wire the 'Spawn In Front' button (no main spawn button)
                const _spawnSelect = document.getElementById('spawnEnemySelect');
                const _spawnCount = document.getElementById('spawnCount');
                try{
                    const _spawnInFrontBtn = document.getElementById('btnSpawnInFront');
                    if(_spawnInFrontBtn){
                        _spawnInFrontBtn.onclick = ()=>{
                            try{
                                const t = (_spawnSelect && _spawnSelect.value) ? _spawnSelect.value : 'gnome';
                                const c = Math.max(1, Math.min(50, parseInt((_spawnCount && _spawnCount.value) || '1',10) || 1));
                                let spawned = 0;
                                for(let i=0;i<c;i++){
                                    try{ const en = spawnInertEnemy(t, { inFrontOfPlayer: true, playerIndex: 0 }); if(en) spawned++; }catch(e){ console.warn('spawnInFront failed', e); }
                                }
                                showTempMessage('Spawned '+spawned+' '+t+' in front', 1400);
                            }catch(e){ console.warn('spawnInFront error', e); showTempMessage('Spawn failed',1200); }
                        };
                    }
                }catch(_){ }

                // persistent minimap rendering in top-right
                (function(){ const mc = document.getElementById('miniMapCanvas'); if(!mc) return; const g2 = mc.getContext('2d'); function render(){ try{ const w = mc.width, h = mc.height; g2.clearRect(0,0,w,h); const tW = w / Math.max(1, cols), tH = h / Math.max(1, rows);
                            // draw map grid (walls/floor)
                            for(let r=0;r<rows;r++){ for(let c=0;c<cols;c++){ const x = c*tW, y = r*tH; if(map[r][c]===1) g2.fillStyle = '#111'; else g2.fillStyle = '#232323'; g2.fillRect(x,y,tW,tH); } }
                            // chests intentionally omitted from this minimap (too noisy)
                            // portals
                            for(const p of portals){ try{ const px = Math.floor(p.x / cellSize), py = Math.floor(p.y / cellSize); if(px<0||py<0||px>=cols||py>=rows) continue; g2.fillStyle='rgba(80,220,120,0.95)'; g2.beginPath(); g2.arc(px*tW + tW/2, py*tH + tH/2, Math.max(2, Math.min(tW,tH)*0.18), 0, Math.PI*2); g2.fill(); }catch(_){ } }
                            // enemies (visible dots). skip dead entries and draw strong red markers for contrast
                            let _enemyCount = 0;
                            for(const e of enemies){
                                try{
                                    if(!e) continue;
                                    if(e.dead) continue;
                                    // tolerate missing numeric x/y by falling back to cell indices (cellCol/cellRow or col/row)
                                    let ex = null, ey = null;
                                    if(typeof e.x === 'number' && typeof e.y === 'number'){ ex = e.x; ey = e.y; }
                                    else if(typeof e.cellCol === 'number' && typeof e.cellRow === 'number'){ ex = e.cellCol * cellSize; ey = e.cellRow * cellSize; }
                                    else if(typeof e.col === 'number' && typeof e.row === 'number'){ ex = e.col * cellSize; ey = e.row * cellSize; }
                                    else continue;
                                    const ec = Math.floor(ex / cellSize), er = Math.floor(ey / cellSize);
                                    if(ec<0||er<0||ec>=cols||er>=rows) continue;
                                    _enemyCount++;
                                    g2.save(); g2.globalAlpha = 1.0;
                                    // use a bold red for enemies to ensure visibility at small scales
                                    const color = '#ff4444';
                                    const erad = Math.max(2.6, Math.min(tW,tH) * 0.24);
                                    // filled circle with a thin dark outline and small white center for contrast
                                    g2.beginPath(); g2.fillStyle = color; g2.arc(ec*tW + tW/2, er*tH + tH/2, erad, 0, Math.PI*2); g2.fill();
                                    g2.lineWidth = 0.9; g2.strokeStyle = 'rgba(0,0,0,0.85)'; g2.stroke();
                                    // white center to make dots readable on busy backgrounds
                                    g2.beginPath(); g2.fillStyle = '#ffffff'; g2.arc(ec*tW + tW/2, er*tH + tH/2, Math.max(0.8, erad * 0.36), 0, Math.PI*2); g2.fill();
                                    g2.restore();
                                }catch(_){ }
                            }
                            // debug label: enemy count on minimap
                            try{ g2.save(); g2.fillStyle = '#fff'; g2.font = '10px sans-serif'; g2.fillText('Enemies: ' + (_enemyCount||0), 4, 10); g2.restore(); }catch(_){ }
                            // players: draw P1 always; draw P2 only when secondPlayerEnabled and player exists/alive
                            for(let i=0;i<players.length;i++){ try{ const p = players[i]; if(!p) continue; if(i===1 && !secondPlayerEnabled) continue; if(p.dead) continue; const pc = Math.floor(p.x / cellSize), pr = Math.floor(p.y / cellSize); if(pc<0||pr<0||pc>=cols||pr>=rows) continue; g2.save(); g2.fillStyle = (i===0 ? '#ffffff' : '#ff69b4'); const prad = Math.max(2.4, Math.min(tW,tH)*0.2); g2.beginPath(); g2.arc(pc*tW + tW/2, pr*tH + tH/2, prad, 0, Math.PI*2); g2.fill(); g2.restore(); }catch(_){ } }
                        }catch(_){ }
                    }
                    (function tick(){ try{ render(); }catch(_){ } requestAnimationFrame(tick); })(); })();
            }catch(_){ }
        </script>
    </body>
